name: Update Website

on:
  push:
    branches: [main]
    paths:
      - 'data/**/*.json'
      - 'README.md'
  workflow_dispatch:

jobs:
  update-website:
    runs-on: ubuntu-latest

    steps:
      - name: Check sync configuration
        id: check-config
        env:
          WEBSITE_TOKEN: ${{ secrets.WEBSITE_UPDATE_TOKEN }}
          WEBSITE_REPO: ${{ vars.WEBSITE_REPO }}
        run: |
          if [ -n "$WEBSITE_TOKEN" ] && [ -n "$WEBSITE_REPO" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout database repository
        if: steps.check-config.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: 'database'

      - name: Checkout website repository
        if: steps.check-config.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.WEBSITE_REPO }}
          path: 'website'
          token: ${{ secrets.WEBSITE_UPDATE_TOKEN }}

      - name: Sync data files into website repo
        if: steps.check-config.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          TARGET_PATH="${{ vars.WEBSITE_DATA_PATH }}"
          if [ -z "$TARGET_PATH" ]; then
            TARGET_PATH="AI-tools-database/data"
          fi

          mkdir -p "website/$TARGET_PATH"
          rsync -av --delete database/data/ "website/$TARGET_PATH/"

      - name: Install website dependencies
        if: steps.check-config.outputs.enabled == 'true'
        working-directory: website
        run: |
          npm install

      - name: Build website
        if: steps.check-config.outputs.enabled == 'true'
        working-directory: website
        run: npm run build

      - name: Create sync pull request
        if: steps.check-config.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.WEBSITE_UPDATE_TOKEN }}
          path: website
          commit-message: "chore(data): sync AI tools database"
          branch: "chore/sync-ai-tools-database"
          title: "Sync AI tools database updates"
          body: |
            Automated sync from ${{ github.repository }}.

            Source commit: ${{ github.sha }}
          labels: |
            automated
            data-sync

      - name: Missing website sync configuration
        if: steps.check-config.outputs.enabled != 'true'
        run: |
          echo "Skipping website sync. Set WEBSITE_UPDATE_TOKEN secret and WEBSITE_REPO variable to enable this workflow."