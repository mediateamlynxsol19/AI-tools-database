name: Validate AI Tools Data

on:
  pull_request:
    paths:
      - 'data/**/*.json'
      - 'scripts/**'
      - 'README.md'
  push:
    branches: [main]
    paths:
      - 'data/**/*.json'
      - 'scripts/**'
      - 'README.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data validation
        run: npm run validate

      - name: Run tests
        run: npm run test

      - name: Format JSON files
        run: npm run format

      - name: Aggregate tools data
        run: npm run aggregate

      - name: Ensure generated files are up to date
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code -- README.md data/stats.json data/tools.json data/tools/*.json web/stats.json web/tools.json || {
            echo "Generated files are out of date. Run: npm run format";
            exit 1;
          }

  sync-generated-files:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate derived files
        run: npm run format

      - name: Commit generated updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): sync generated stats and README"
          file_pattern: README.md data/stats.json data/tools.json data/tools/*.json web/stats.json web/tools.json